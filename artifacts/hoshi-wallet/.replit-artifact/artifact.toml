kind = "web"
previewPath = "/"
title = "HOSHI Wallet"
version = "1.0.0"
id = "artifacts/hoshi-wallet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 5173

[services.development]
run = "PORT=5173 BASE_PATH=/ pnpm --filter @workspace/hoshi-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hoshi-wallet", "run", "build" ]
publicDir = "artifacts/hoshi-wallet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "5173"
BASE_PATH = "/"
