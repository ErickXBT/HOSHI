<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>HOSHI Swap</title>
    <meta name="description" content="HOSHI Swap — Next-Gen Crypto Super Wallet. Non-custodial, multi-chain: ETH, SOL, BNB, Polygon and more." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="HOSHI Swap" />
    <meta property="og:description" content="Next-Gen Crypto Super Wallet — non-custodial, multi-chain." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HOSHI Swap" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#F97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HOSHI" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('[HOSHI SW] registered ✅', reg.scope);
          }).catch(err => {
            console.warn('[HOSHI SW] registration failed:', err);
          });
        });
      }
    </script>
  </body>
